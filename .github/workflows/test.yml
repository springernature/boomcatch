name: Test
on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main
jobs:
  test:
    runs-on: '${{ matrix.os }}'
    strategy:
      matrix:
        os:
          - ubuntu-latest
        node-version:
          - 16
          - 18
          - 20
          - 22
          - 24
    steps:
      - name: 'Set up Node.js ${{ matrix.node-version }}'
        uses: actions/setup-node@6044e13b5dc448c55e2357c09f80417699197238 # Equivalent to v6.2.0
        with:
          node-version: '${{ matrix.node-version }}'
      - name: 'Checkout repository'
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # Equivalent to v6.0.2
      - name: Install dependencies
        run: 'npm install'
      - name: Run tests and linting
        run: 'npm run lint && npm run test'
